# ─────────────────────────────────────────────────────────────────────────────
# netlify.toml — STAGING BRANCH ONLY (Frontend Staging Only)
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"
  VITE_API_URL = "https://api.montclair-watch.com/api"

# ─── Redirect: SPA catch-all (React Router) ──────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Staging-specific headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Environment = "staging"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
