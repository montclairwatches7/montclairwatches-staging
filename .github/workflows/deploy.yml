name: Build & Validate

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ─── Build Frontend ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --legacy-peer-deps

      - name: Build frontend
        env:
          # For main  → points to Hostinger production API
          # For staging → points to Netlify function URL
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.VITE_API_URL || secrets.STAGING_VITE_API_URL }}
          CI: false
        run: npm run build --prefix frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}
          path: frontend/dist/
          retention-days: 7

  # ─── Validate Backend ────────────────────────────────────────────────────────
  validate-backend:
    name: Validate Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend --legacy-peer-deps

      - name: Check backend syntax
        run: node --check backend/src/server.js

  # ─── Sync to Staging Repo ───────────────────────────────────────────────────
  sync-staging-repo:
    name: Sync Staging Repo (staging -> target main)
    runs-on: ubuntu-latest
    needs: [build-frontend, validate-backend]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to target staging repository
        run: |
          git push --force https://${{ secrets.SYNC_PAT }}@github.com/montclairwatches7/montclairwatches-staging.git staging:main

  # ─── Summary ──────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-frontend, validate-backend, sync-staging-repo]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "========================================"
          echo "  Montclair Watches CI Summary"
          echo "  Branch: ${{ github.ref_name }}"
          echo "========================================"
          echo "Frontend Build : ${{ needs.build-frontend.result }}"
          echo "Backend Check  : ${{ needs.validate-backend.result }}"
          echo "Sync Repo      : ${{ needs.sync-staging-repo.result }}"
          echo ""
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "→ PRODUCTION: Hostinger hPanel auto-deploys from main."
          else
            echo "→ STAGING: Netlify auto-deploys from staging branch (mirrored to staging repo)."
          fi
          echo "========================================"

