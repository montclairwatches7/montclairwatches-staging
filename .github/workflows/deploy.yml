name: Build & Validate

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ─── Build Frontend ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --legacy-peer-deps

      - name: Build frontend
        env:
          VITE_API_URL: https://api.montclair-watch.com/api
          CI: false
        run: npm run build --prefix frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}
          path: frontend/dist/
          retention-days: 7

  # ─── Validate Laravel Backend ────────────────────────────────────────────────
  validate-backend:
    name: Validate Backend (Laravel PHP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, openssl, tokenizer, xml, ctype, json, bcmath, curl
          tools: composer:v2

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
        working-directory: backend

      - name: Check Laravel routes compile
        run: php artisan route:list --json > /dev/null
        working-directory: backend
        env:
          APP_KEY: base64:NGX8jxU6HM/n/AbPZe1zu+SCpDod8p9bQZI9yrNDDR8=
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  # ─── Sync to Staging Repo ───────────────────────────────────────────────────
  sync-staging-repo:
    name: Sync Staging Repo (staging -> target main)
    runs-on: ubuntu-latest
    needs: [build-frontend, validate-backend]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to target staging repository
        run: |
          git push --force https://${{ secrets.SYNC_PAT }}@github.com/montclairwatches7/montclairwatches-staging.git staging:main

  # ─── Summary ──────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-frontend, validate-backend, sync-staging-repo]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "========================================"
          echo "  Montclair Watches CI Summary"
          echo "  Branch: ${{ github.ref_name }}"
          echo "========================================"
          echo "Frontend Build : ${{ needs.build-frontend.result }}"
          echo "Backend Check  : ${{ needs.validate-backend.result }}"
          echo "Sync Repo      : ${{ needs.sync-staging-repo.result }}"
          echo ""
          echo "→ API: https://api.montclair-watch.com/api"
          echo "→ Staging: https://montclairwatches-staging.netlify.app"
          echo "========================================"
