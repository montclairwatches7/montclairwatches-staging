name: Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Build Frontend ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --legacy-peer-deps

      - name: Build frontend
        env:
          # VITE_API_URL will be injected from GitHub Secrets
          # Set this in: Repo → Settings → Secrets → Actions → New secret
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          CI: false
        run: npm run build --prefix frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Validate Backend ───────────────────────────────────────
  validate-backend:
    name: Validate Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend --legacy-peer-deps

      - name: Check backend syntax
        run: node --check backend/src/server.js

  # ─── Summary ────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-frontend, validate-backend]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "================================"
          echo "  Montclair Watches CI Summary  "
          echo "================================"
          echo "Frontend Build : ${{ needs.build-frontend.result }}"
          echo "Backend Check  : ${{ needs.validate-backend.result }}"
          echo ""
          echo "Deployment Note:"
          echo "  Hostinger hPanel auto-deploys from GitHub (main branch)."
          echo "  Set environment variables directly in hPanel → Node.js App."
          echo "================================"
